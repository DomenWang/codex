services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: weather_alarm
      POSTGRES_USER: weather_alarm
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_alarm -d weather_alarm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
