name: WeatherAlarm

options:
  bundleIdPrefix: com.domenx
  deploymentTarget:
    iOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  WeatherAlarm:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WeatherAlarm
      - path: outputs/WeatherAlarmCore
        excludes:
          - IntegrationNotes.md
    info:
      path: WeatherAlarm/Info.plist
      properties:
        CFBundleDisplayName: SmartWake
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLName: weatherwake.invite
            CFBundleURLSchemes:
              - weatherwake
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAlarmKitUsageDescription: 根据早晨天气和路况提前您的起床闹钟。
        NSLocationWhenInUseUsageDescription: 用于获取您所在位置的真实天气预报。
        AMapWebServiceAPIKey: ae9b87a9bed26996b16ff1d016c57324
        AuthAPIBaseURL: https://domenwang-weather-alarm-auth.onrender.com
        BGTaskSchedulerPermittedIdentifiers:
          - com.domenx.SmartWake.daily-weather-refresh
        UIBackgroundModes:
          - fetch
    entitlements:
      path: WeatherAlarm/WeatherAlarm.entitlements
    dependencies:
      - target: WeatherAlarmWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.domenx.SmartWake
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  WeatherAlarmWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WeatherAlarmWidget
      - path: outputs/WeatherAlarmCore/Models/WeatherAlarmStatus.swift
      - path: outputs/WeatherAlarmCore/Services/Persistence/AppGroupUserDefaults.swift
      - path: outputs/WeatherAlarmCore/Services/Persistence/WeatherAlarmStatusStore.swift
    info:
      path: WeatherAlarmWidget/Info.plist
      properties:
        CFBundleDisplayName: WeatherAlarmWidget
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: WeatherAlarmWidget/WeatherAlarmWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.domenx.SmartWake.widget
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
