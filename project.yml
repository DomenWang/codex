name: WeatherAlarm

options:
  bundleIdPrefix: com.domenx
  deploymentTarget:
    iOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  WeatherAlarm:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WeatherAlarm
        excludes:
          - graphify-out
      - path: outputs/WeatherAlarmCore
        excludes:
          - IntegrationNotes.md
    info:
      path: WeatherAlarm/Info.plist
      properties:
        CFBundleDisplayName: SmartWake
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "35"
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: weatherwake.invite
            CFBundleURLSchemes:
              - weatherwake
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAlarmKitUsageDescription: Used to adjust your wake-up alarm based on tomorrow morning weather and commute conditions.
        NSLocationWhenInUseUsageDescription: 用于获取当前位置，以便查询对应时段的真实天气并计算智能提前。
        NSLocationAlwaysAndWhenInUseUsageDescription: Used to refresh weather and commute conditions before alarms so SmartWake can adjust wake-up time reliably.
        NSLocationAlwaysUsageDescription: Used to refresh weather and commute conditions before alarms so SmartWake can adjust wake-up time reliably.
        NSMotionUsageDescription: Used to verify shake or walking challenges before dismissing selected alarms.
        AuthAPIBaseURL: https://domenwang-weather-alarm-auth.onrender.com
        BGTaskSchedulerPermittedIdentifiers:
          - com.domenx.SmartWake.daily-weather-refresh
        UIBackgroundModes:
          - audio
          - fetch
    entitlements:
      path: WeatherAlarm/WeatherAlarm.entitlements
    dependencies:
      - target: WeatherAlarmWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.domenx.SmartWake
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SH7C363297
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG SMARTWAKE_ALL_PAID_TEST"

  WeatherAlarmWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WeatherAlarmWidget
      - path: outputs/WeatherAlarmCore/Models/WeatherAlarmStatus.swift
      - path: outputs/WeatherAlarmCore/Services/Persistence/AppGroupUserDefaults.swift
      - path: outputs/WeatherAlarmCore/Services/Persistence/WeatherAlarmStatusStore.swift
    info:
      path: WeatherAlarmWidget/Info.plist
      properties:
        CFBundleDisplayName: SmartWake
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "35"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: WeatherAlarmWidget/WeatherAlarmWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.domenx.SmartWake.widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SH7C363297
        APPLICATION_EXTENSION_API_ONLY: YES

  WeatherAlarmTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WeatherAlarmTests
    dependencies:
      - target: WeatherAlarm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.domenx.SmartWake.tests
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG SMARTWAKE_ALL_PAID_TEST"

schemes:
  WeatherAlarm:
    build:
      targets:
        WeatherAlarm: all
        WeatherAlarmTests: [test]
    test:
      targets:
        - WeatherAlarmTests
