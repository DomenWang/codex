name: iOS App Store Upload

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  # Update these values after the real Xcode project is committed.
  XCODE_PROJECT: WeatherAlarm.xcodeproj
  XCODE_WORKSPACE: ""
  SCHEME: WeatherAlarm
  CONFIGURATION: Release
  ARCHIVE_PATH: build/WeatherAlarm.xcarchive
  EXPORT_PATH: build/export

jobs:
  archive-and-upload:
    name: Archive and Upload IPA
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode_26.5.app ]]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          xcodebuild -showsdks

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${XCODE_WORKSPACE}" && ! -d "${XCODE_PROJECT}" ]]; then
            if [[ ! -f project.yml ]]; then
              echo "::error::Missing ${XCODE_PROJECT} and project.yml. Commit an Xcode project or an XcodeGen spec."
              exit 1
            fi

            brew untap aws/tap || true
            brew install xcodegen
            xcodegen generate --spec project.yml
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required_secrets=(
            "EXPORT_OPTIONS"
            "APPLE_API_KEY_BASE64"
            "APPLE_API_KEY_ID"
            "APPLE_API_ISSUER_ID"
          )

          for secret_name in "${required_secrets[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing GitHub secret: ${secret_name}"
              exit 1
            fi
          done
        env:
          EXPORT_OPTIONS: ${{ secrets.EXPORT_OPTIONS }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Validate Xcode project
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${XCODE_WORKSPACE}" ]]; then
            if [[ ! -d "${XCODE_WORKSPACE}" ]]; then
              echo "::error::XCODE_WORKSPACE is set to '${XCODE_WORKSPACE}', but that directory does not exist."
              exit 1
            fi
          else
            if [[ ! -d "${XCODE_PROJECT}" ]]; then
              echo "::error::Missing ${XCODE_PROJECT}. Create the Xcode iOS app project and commit it before running App Store upload."
              exit 1
            fi
          fi

      - name: Create ExportOptions.plist
        shell: bash
        env:
          EXPORT_OPTIONS: ${{ secrets.EXPORT_OPTIONS }}
        run: |
          set -euo pipefail
          printf "%s" "${EXPORT_OPTIONS}" > ExportOptions.plist
          plutil -lint ExportOptions.plist

      - name: Create App Store Connect private key
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          printf "%s" "${APPLE_API_KEY_BASE64}" | base64 --decode > "private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          chmod 600 "private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      - name: List schemes
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${XCODE_WORKSPACE}" ]]; then
            xcodebuild -list -workspace "${XCODE_WORKSPACE}"
          else
            xcodebuild -list -project "${XCODE_PROJECT}"
          fi

      - name: Archive project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build

          common_args=(
            -scheme "${SCHEME}"
            -configuration "${CONFIGURATION}"
            -sdk iphoneos
            -archivePath "${ARCHIVE_PATH}"
            -allowProvisioningUpdates
            -authenticationKeyPath "${PWD}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
            -authenticationKeyID "${{ secrets.APPLE_API_KEY_ID }}"
            -authenticationKeyIssuerID "${{ secrets.APPLE_API_ISSUER_ID }}"
            archive
          )

          if [[ -n "${XCODE_WORKSPACE}" ]]; then
            xcodebuild -workspace "${XCODE_WORKSPACE}" "${common_args[@]}"
          else
            xcodebuild -project "${XCODE_PROJECT}" "${common_args[@]}"
          fi

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "${EXPORT_PATH}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${PWD}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.APPLE_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPLE_API_ISSUER_ID }}"

          ls -la "${EXPORT_PATH}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: WeatherAlarm-ipa
          path: ${{ env.EXPORT_PATH }}/*.ipa
          if-no-files-found: error

      - name: Upload IPA to App Store Connect
        shell: bash
        run: |
          set -euo pipefail

          ipa_path="$(find "${EXPORT_PATH}" -type f -name "*.ipa" -print -quit)"
          if [[ -z "${ipa_path}" ]]; then
            echo "::error::No IPA found in ${EXPORT_PATH}"
            exit 1
          fi

          xcrun altool --upload-app \
            --type ios \
            --file "${ipa_path}" \
            --apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER_ID }}"
