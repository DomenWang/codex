name: iOS App Store Upload

on:
  workflow_dispatch:
    inputs:
      mode:
        description: App Store Connect operation
        required: true
        default: upload
        type: choice
        options:
          - upload
          - inspect
          - release
          - repair
          - finalize
          - resubmit
          - replace
  push:
    tags:
      - "v*"

env:
  # Update these values after the real Xcode project is committed.
  XCODE_PROJECT: WeatherAlarm.xcodeproj
  XCODE_WORKSPACE: ""
  SCHEME: WeatherAlarm
  CONFIGURATION: Release
  ARCHIVE_PATH: build/SmartWake.xcarchive
  EXPORT_PATH: build/export

jobs:
  resubmit-existing-app-review:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'resubmit' }}
    name: Resubmit Existing App Review
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resubmit the unresolved iOS review
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          ASC_APP_ID: "6788850214"
        run: |
          set -euo pipefail
          gem install jwt --no-document
          for attempt in $(seq 1 12); do
            echo "Review resubmission attempt ${attempt}/12"
            if ruby .github/scripts/asc_resubmit_review.rb; then
              exit 0
            fi
            sleep 30
          done
          echo "::error::App Store version did not become ready within the retry window."
          exit 1

  repair-app-store-screenshot:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'repair' }}
    name: Repair Missing iPad Screenshot
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload the missing iPad screenshot
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          ASC_APP_ID: "6788850214"
          ASC_VERSION: "1.0"
          ASC_SCREENSHOT_PATH: "fastlane/screenshots/zh-Hans/ipad_01-tomorrow.png"
        run: |
          set -euo pipefail
          gem install jwt --no-document
          ruby .github/scripts/asc_upload_missing_screenshot.rb

  finalize-app-store-release:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'finalize' }}
    name: Bind Build 35 and Submit Review
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install fastlane when needed
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v fastlane >/dev/null 2>&1; then
            brew install fastlane
          fi
          fastlane --version

      - name: Bind Build 35 and submit
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          fastlane ios finalize_build35

  release-app-store:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
    name: Release Build 35 to App Review
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate App Store Connect secrets
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          for secret_name in APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER_ID; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing GitHub secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Install fastlane when needed
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v fastlane >/dev/null 2>&1; then
            brew install fastlane
          fi
          fastlane --version

      - name: Update metadata, screenshots, and submit Build 35
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          fastlane ios release_build35

  inspect-app-store-connect:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'inspect' }}
    name: Inspect App Store Connect
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate App Store Connect secrets
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          for secret_name in APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER_ID; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing GitHub secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Inspect SmartWake Build 35
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          ASC_APP_ID: "6788850214"
          ASC_VERSION: "1.0"
          ASC_BUILD: "35"
        run: |
          set -euo pipefail
          gem install jwt --no-document
          ruby .github/scripts/asc_inspect.rb
          ruby .github/scripts/asc_inspect_products.rb

  replace-app-store-build:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'replace' }}
    name: Replace Review Build with Build 35
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Wait for Build 35, cancel the old submission, and attach it
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          ASC_APP_ID: "6788850214"
          ASC_VERSION: "1.0"
          ASC_BUILD: "35"
        run: |
          set -euo pipefail
          gem install jwt --no-document
          ruby .github/scripts/asc_prepare_build_replacement.rb

      - name: Install fastlane when needed
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v fastlane >/dev/null 2>&1; then
            brew install fastlane
          fi
          fastlane --version

      - name: Submit Build 35
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          fastlane ios finalize_build35

  archive-and-upload:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'upload' }}
    name: Archive and Upload IPA
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode_26.5.app ]]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          xcodebuild -showsdks

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${XCODE_WORKSPACE}" && ! -d "${XCODE_PROJECT}" ]]; then
            if [[ ! -f project.yml ]]; then
              echo "::error::Missing ${XCODE_PROJECT} and project.yml. Commit an Xcode project or an XcodeGen spec."
              exit 1
            fi

            brew untap aws/tap || true
            brew install xcodegen
            xcodegen generate --spec project.yml
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required_secrets=(
            "EXPORT_OPTIONS"
            "APPLE_API_KEY_BASE64"
            "APPLE_API_KEY_ID"
            "APPLE_API_ISSUER_ID"
            "APPLE_TEAM_ID"
          )

          for secret_name in "${required_secrets[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing GitHub secret: ${secret_name}"
              exit 1
            fi
          done
        env:
          EXPORT_OPTIONS: ${{ secrets.EXPORT_OPTIONS }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Validate Xcode project
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${XCODE_WORKSPACE}" ]]; then
            if [[ ! -d "${XCODE_WORKSPACE}" ]]; then
              echo "::error::XCODE_WORKSPACE is set to '${XCODE_WORKSPACE}', but that directory does not exist."
              exit 1
            fi
          else
            if [[ ! -d "${XCODE_PROJECT}" ]]; then
              echo "::error::Missing ${XCODE_PROJECT}. Create the Xcode iOS app project and commit it before running App Store upload."
              exit 1
            fi
          fi

      - name: Create ExportOptions.plist
        shell: bash
        env:
          EXPORT_OPTIONS: ${{ secrets.EXPORT_OPTIONS }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          printf "%s" "${EXPORT_OPTIONS}" > ExportOptions.plist

          /usr/libexec/PlistBuddy -c "Set :method app-store-connect" ExportOptions.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :destination export" ExportOptions.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :destination string export" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :teamID ${APPLE_TEAM_ID}" ExportOptions.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :teamID string ${APPLE_TEAM_ID}" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :signingStyle automatic" ExportOptions.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :signingStyle string automatic" ExportOptions.plist

          plutil -lint ExportOptions.plist
          plutil -p ExportOptions.plist

      - name: Create App Store Connect private key
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          printf "%s" "${APPLE_API_KEY_BASE64}" | base64 --decode > "private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          chmod 600 "private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      - name: List schemes
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${XCODE_WORKSPACE}" ]]; then
            xcodebuild -list -workspace "${XCODE_WORKSPACE}"
          else
            xcodebuild -list -project "${XCODE_PROJECT}"
          fi

      - name: Archive project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build build-logs

          common_args=(
            -scheme "${SCHEME}"
            -configuration "${CONFIGURATION}"
            -sdk iphoneos
            -destination "generic/platform=iOS"
            -archivePath "${ARCHIVE_PATH}"
            -allowProvisioningUpdates
            -authenticationKeyPath "${PWD}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
            -authenticationKeyID "${{ secrets.APPLE_API_KEY_ID }}"
            -authenticationKeyIssuerID "${{ secrets.APPLE_API_ISSUER_ID }}"
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"
            CODE_SIGNING_ALLOWED=NO
            archive
          )

          archive_status=0

          set +e
          if [[ -n "${XCODE_WORKSPACE}" ]]; then
            xcodebuild -workspace "${XCODE_WORKSPACE}" "${common_args[@]}" 2>&1 | tee build-logs/archive.log
            archive_status=${PIPESTATUS[0]}
          else
            xcodebuild -project "${XCODE_PROJECT}" "${common_args[@]}" 2>&1 | tee build-logs/archive.log
            archive_status=${PIPESTATUS[0]}
          fi
          set -e

          if [[ "${archive_status}" -ne 0 ]]; then
            echo "::group::xcodebuild archive error summary"
            grep -nE "error:|Error|failed|Failed|warning:|No such module|No profiles|No Account|Signing|Provisioning|provisioning|entitlement|Bundle identifier|requires a provisioning profile|Authentication|Team|BUILD FAILED" build-logs/archive.log || true
            echo "--- Last 300 lines ---"
            tail -300 build-logs/archive.log || true
            echo "::endgroup::"

            summary="$(grep -nE "error:|Error|failed|Failed|No such module|No profiles|No Account|Signing|Provisioning|provisioning|entitlement|Bundle identifier|requires a provisioning profile|Authentication|Team|BUILD FAILED" build-logs/archive.log | tail -20 | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g' || true)"
            if [[ -n "${summary}" ]]; then
              echo "::error title=xcodebuild archive failed::${summary}"
            else
              echo "::error title=xcodebuild archive failed::See archive.log artifact for details."
            fi

            tail_summary="$(tail -300 build-logs/archive.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g' || true)"
            if [[ -n "${tail_summary}" ]]; then
              echo "::error title=xcodebuild archive last 300 lines::${tail_summary}"
            fi

            compact_tail="$(tail -300 build-logs/archive.log | sed 's/%/%25/g;s/\r/%0D/g' | tr '\n' ' ' | cut -c 1-12000 || true)"
            if [[ -n "${compact_tail}" ]]; then
              echo "::error title=xcodebuild archive compact tail::${compact_tail}"
            fi

            exit "${archive_status}"
          fi

      - name: Upload archive logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: app-store-archive-logs
          path: build-logs
          if-no-files-found: ignore

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build-logs

          export_status=0
          set +e
          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "${EXPORT_PATH}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${PWD}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.APPLE_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPLE_API_ISSUER_ID }}" \
            2>&1 | tee build-logs/export.log
          export_status=${PIPESTATUS[0]}
          set -e

          if [[ "${export_status}" -ne 0 ]]; then
            echo "::group::xcodebuild export error summary"
            grep -nE "error:|Error|failed|Failed|No profiles|No Account|Signing|Provisioning|provisioning|entitlement|Bundle identifier|requires a provisioning profile|Authentication|Team|exportArchive|IDEDistribution" build-logs/export.log || true
            echo "--- Last 300 lines ---"
            tail -300 build-logs/export.log || true
            echo "::endgroup::"

            compact_tail="$(tail -300 build-logs/export.log | sed 's/%/%25/g;s/\r/%0D/g' | tr '\n' ' ' | cut -c 1-12000 || true)"
            if [[ -n "${compact_tail}" ]]; then
              echo "::error title=xcodebuild export compact tail::${compact_tail}"
            fi

            exit "${export_status}"
          fi

          ls -la "${EXPORT_PATH}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: SmartWake-ipa
          path: ${{ env.EXPORT_PATH }}/*.ipa
          if-no-files-found: error

      - name: Upload IPA to App Store Connect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build-logs

          ipa_path="$(find "${EXPORT_PATH}" -type f -name "*.ipa" -print -quit)"
          if [[ -z "${ipa_path}" ]]; then
            echo "::error::No IPA found in ${EXPORT_PATH}"
            exit 1
          fi

          upload_status=0
          set +e
          xcrun altool --upload-app \
            --type ios \
            --file "${ipa_path}" \
            --apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER_ID }}" \
            2>&1 | tee build-logs/upload.log
          upload_status=${PIPESTATUS[0]}
          set -e

          if [[ "${upload_status}" -ne 0 ]]; then
            compact_tail="$(tail -300 build-logs/upload.log | sed 's/%/%25/g;s/\r/%0D/g' | tr '\n' ' ' | cut -c 1-12000 || true)"
            if [[ -n "${compact_tail}" ]]; then
              echo "::error title=App Store Connect upload failed::${compact_tail}"
            fi
            exit "${upload_status}"
          fi
