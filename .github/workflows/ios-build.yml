name: iOS Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  # Change these after you create the real Xcode project, if needed.
  XCODE_PROJECT: WeatherAlarm.xcodeproj
  XCODE_WORKSPACE: ""
  SCHEME: WeatherAlarm
  DESTINATION: generic/platform=iOS Simulator

jobs:
  build:
    name: Build WeatherAlarm
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun simctl list devices available

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${XCODE_WORKSPACE}" && ! -d "${XCODE_PROJECT}" ]]; then
            if [[ ! -f project.yml ]]; then
              echo "::error::Missing ${XCODE_PROJECT} and project.yml. Commit an Xcode project or an XcodeGen spec."
              exit 1
            fi

            brew install xcodegen
            xcodegen generate --spec project.yml
          fi

      - name: Validate Xcode project
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${XCODE_WORKSPACE}" ]]; then
            if [[ ! -d "${XCODE_WORKSPACE}" ]]; then
              echo "::error::XCODE_WORKSPACE is set to '${XCODE_WORKSPACE}', but that directory does not exist."
              exit 1
            fi
          else
            if [[ ! -d "${XCODE_PROJECT}" ]]; then
              echo "::error::Missing ${XCODE_PROJECT}. Create an iOS App project in Xcode, add the WeatherAlarmCore sources to the app target, then commit the .xcodeproj."
              exit 1
            fi
          fi

      - name: List schemes
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${XCODE_WORKSPACE}" ]]; then
            xcodebuild -list -workspace "${XCODE_WORKSPACE}"
          else
            xcodebuild -list -project "${XCODE_PROJECT}"
          fi

      - name: Build for iOS Simulator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build-logs

          if [[ -n "${XCODE_WORKSPACE}" ]]; then
            xcodebuild \
              -workspace "${XCODE_WORKSPACE}" \
              -scheme "${SCHEME}" \
              -destination "${DESTINATION}" \
              CODE_SIGNING_ALLOWED=NO \
              clean build 2>&1 | tee build-logs/xcodebuild.log
          else
            xcodebuild \
              -project "${XCODE_PROJECT}" \
              -scheme "${SCHEME}" \
              -destination "${DESTINATION}" \
              CODE_SIGNING_ALLOWED=NO \
              clean build 2>&1 | tee build-logs/xcodebuild.log
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: build-logs
          if-no-files-found: ignore
