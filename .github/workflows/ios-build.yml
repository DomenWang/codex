name: iOS Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  # Change these after you create the real Xcode project, if needed.
  XCODE_PROJECT: WeatherAlarm.xcodeproj
  XCODE_WORKSPACE: ""
  SCHEME: WeatherAlarm
  DESTINATION: platform=iOS Simulator,name=iPhone 16

jobs:
  build:
    name: Build WeatherAlarm
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun simctl list devices available

      - name: Resolve build mode
        id: build_mode
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${XCODE_WORKSPACE}" ]]; then
            if [[ ! -d "${XCODE_WORKSPACE}" ]]; then
              echo "::error::XCODE_WORKSPACE is set to '${XCODE_WORKSPACE}', but that directory does not exist."
              exit 1
            fi
            echo "mode=workspace" >> "${GITHUB_OUTPUT}"
          else
            if [[ -d "${XCODE_PROJECT}" ]]; then
              echo "mode=project" >> "${GITHUB_OUTPUT}"
            else
              echo "::notice::${XCODE_PROJECT} not found. Falling back to Swift syntax validation for outputs/WeatherAlarmCore."
              echo "mode=swift-syntax" >> "${GITHUB_OUTPUT}"
            fi
          fi

      - name: List schemes
        if: steps.build_mode.outputs.mode != 'swift-syntax'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.build_mode.outputs.mode }}" == "workspace" ]]; then
            xcodebuild -list -workspace "${XCODE_WORKSPACE}"
          else
            xcodebuild -list -project "${XCODE_PROJECT}"
          fi

      - name: Build for iOS Simulator
        if: steps.build_mode.outputs.mode != 'swift-syntax'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.build_mode.outputs.mode }}" == "workspace" ]]; then
            xcodebuild \
              -workspace "${XCODE_WORKSPACE}" \
              -scheme "${SCHEME}" \
              -destination "${DESTINATION}" \
              CODE_SIGNING_ALLOWED=NO \
              clean build
          else
            xcodebuild \
              -project "${XCODE_PROJECT}" \
              -scheme "${SCHEME}" \
              -destination "${DESTINATION}" \
              CODE_SIGNING_ALLOWED=NO \
              clean build
          fi

      - name: Validate WeatherAlarmCore Swift syntax
        if: steps.build_mode.outputs.mode == 'swift-syntax'
        shell: bash
        run: |
          set -euo pipefail
          find outputs/WeatherAlarmCore -name "*.swift" -print0 | while IFS= read -r -d '' file; do
            swift -frontend -parse "${file}"
          done
